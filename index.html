<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Porto Pollo Discovery 2026 — Sport, Escursioni, Hotel, Ristoranti, Barche, Golf · Palau Sardegna</title>
<meta name="description" content="Guida completa Porto Pollo e Palau 2026: windsurf kitesurf wingfoil, barche gommoni, escursioni arcipelago La Maddalena, hotel, ristoranti cucina sarda, golf, spa, diving, bici. Tutto in un click.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --org:#F5A623;--org2:#E8940F;--tl:#2ABFBF;--tl2:#1EA8A8;
  --oc:#1A3A4A;--oc2:#2D5F73;
  --bg:#F4F1EC;--w:#fff;--tx:#1C1C2E;--mu:#64748B;--mu2:#94A3B8;
  --br:#E2E8F0;--br2:#CBD5E1;
  --r:14px;--rs:9px;
  --sh:0 1px 4px rgba(26,58,74,.05),0 4px 16px rgba(26,58,74,.06);
  --shh:0 4px 24px rgba(26,58,74,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.6;overflow-x:hidden}

/* ── TOP BAR ── */
#topbar{background:var(--oc);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:400;box-shadow:0 2px 14px rgba(0,0,0,.25)}
.tb-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.tb-logo img{height:36px;width:auto}
.tb-logo-txt{font-family:'Syne',sans-serif;color:#fff;font-size:16px;font-weight:800;letter-spacing:-.2px}
.tb-logo-txt span{color:var(--org);font-size:12px;font-weight:500;display:block;letter-spacing:.5px;font-family:'Inter',sans-serif}
#langbar{display:flex;gap:4px}
.lb{padding:5px 10px;border-radius:18px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.55);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
.lb.on,.lb:hover{background:rgba(255,255,255,.14);color:#fff;border-color:rgba(255,255,255,.4)}

/* ── HERO ── */
#hero{background:linear-gradient(140deg,var(--oc) 0%,var(--oc2) 50%,var(--tl2) 100%);padding:44px 22px 38px;text-align:center;position:relative;overflow:hidden}
#hero::before{content:'';position:absolute;top:-80px;right:-80px;width:320px;height:320px;border-radius:50%;background:rgba(245,166,35,.08)}
#hero::after{content:'';position:absolute;bottom:-80px;left:-60px;width:240px;height:240px;border-radius:50%;background:rgba(42,191,191,.08)}
.h-tag{display:inline-block;background:rgba(245,166,35,.2);color:var(--org);font-size:10px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-bottom:14px;position:relative;border:1px solid rgba(245,166,35,.3)}
#htitle{font-family:'Syne',sans-serif;font-size:clamp(22px,4vw,38px);font-weight:800;color:#fff;line-height:1.15;margin-bottom:10px;position:relative}
#hdesc{color:rgba(255,255,255,.75);font-size:13px;max-width:520px;margin:0 auto 22px;position:relative}
#hstats{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;position:relative}
.hstat strong{display:block;font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff}
.hstat span{font-size:10px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.5px}

/* ── LAYOUT ── */
#layout{display:flex;align-items:flex-start;min-height:calc(100vh - 56px)}

/* ── SIDEBAR ── */
#sidebar{width:210px;flex-shrink:0;background:var(--w);border-right:1px solid var(--br);position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;padding:12px 0 20px}
#sidebar::-webkit-scrollbar{width:3px}
#sidebar::-webkit-scrollbar-thumb{background:var(--br2);border-radius:2px}
.sb-sec{padding:10px 16px 4px;font-size:10px;font-weight:700;color:var(--mu2);text-transform:uppercase;letter-spacing:1.2px}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;font-size:13px;font-weight:500;color:var(--mu);border-left:3px solid transparent;transition:all .15s;user-select:none}
.sb-item:hover{background:var(--bg);color:var(--oc)}
.sb-item.on{background:rgba(42,191,191,.07);color:var(--tl2);border-left-color:var(--tl);font-weight:600}
.sb-emoji{font-size:17px;width:22px;text-align:center;flex-shrink:0}
.sb-cnt{margin-left:auto;background:var(--br);color:var(--mu2);font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;min-width:20px;text-align:center}
.sb-item.on .sb-cnt{background:rgba(42,191,191,.15);color:var(--tl2)}

/* ── MAIN ── */
#main{flex:1;padding:22px 20px;min-width:0}
.sec-head{margin-bottom:18px}
.sec-head h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:3px}
.sec-head p{font-size:12px;color:var(--mu)}

/* ── GRID ── */
#cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:18px}

/* ── CARD ── */
.card{background:var(--w);border-radius:var(--r);border:1px solid var(--br);box-shadow:var(--sh);overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .2s,transform .2s}
.card:hover{box-shadow:var(--shh);transform:translateY(-2px)}
.card.feat{border:2px solid var(--org)}

/* Gallery */
.gal{position:relative;height:185px;background:linear-gradient(135deg,#B8DEED,#A0D8C0);overflow:hidden;flex-shrink:0}
.gal-wrap{display:flex;height:100%;transition:transform .35s ease}
.gal-img{min-width:100%;height:100%;object-fit:cover;flex-shrink:0}
.gal-fb{min-width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:54px;flex-shrink:0;background:linear-gradient(135deg,#DDF0FB,#C5EDE5)}
.gal-prev,.gal-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.4);color:#fff;border:none;width:28px;height:28px;border-radius:50%;font-size:13px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:4;transition:background .15s}
.gal-prev{left:7px}.gal-next{right:7px}
.card:hover .gal-prev,.card:hover .gal-next{display:flex}
.gal-prev:hover,.gal-next:hover{background:rgba(0,0,0,.65)}
.gal-dots{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:4}
.gal-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.45);transition:background .15s}
.gal-dot.on{background:#fff}
.gal-feat{position:absolute;top:9px;left:9px;background:var(--org);color:#fff;font-size:9px;font-weight:700;padding:3px 9px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px;font-family:'Syne',sans-serif}
.gal-cat{position:absolute;top:9px;right:9px;background:rgba(26,58,74,.55);color:#fff;font-size:10px;padding:3px 8px;border-radius:8px}

/* Rating */
.c-rat{display:flex;align-items:center;gap:5px;padding:7px 13px 0;flex-wrap:wrap}
.c-stars{color:var(--org);font-size:12px;letter-spacing:.5px}
.c-rnum{font-size:12px;font-weight:600}
.c-rcnt{font-size:11px;color:var(--mu)}
.c-rlink{font-size:11px;color:var(--tl2);text-decoration:none;margin-left:auto;font-weight:500;white-space:nowrap}
.c-rlink:hover{text-decoration:underline}

/* Body */
.c-body{padding:12px 13px;flex:1;display:flex;flex-direction:column;gap:8px}
.c-badges{display:flex;flex-wrap:wrap;gap:3px}
.badge{font-size:9px;padding:2px 7px;border-radius:5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.bg{background:#F1F5F9;color:#475569}
.bw{background:#D1FAE5;color:#065F46}.bk{background:#EDE9FE;color:#5B21B6}
.bwf{background:#DBEAFE;color:#1E40AF}.bs{background:#FEF3C7;color:#92400E}
.be{background:#E0F2FE;color:#075985}.bf{background:var(--org);color:#fff}
.c-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;line-height:1.2}
.c-sub{font-size:10px;color:var(--mu);font-style:italic}
.c-desc{font-size:12px;color:#4B5563;line-height:1.65}
.c-prices{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.c-pb{background:var(--bg);border-radius:7px;padding:6px 9px;border:1px solid var(--br)}
.c-pl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.2px;margin-bottom:1px}
.c-pv{font-size:14px;font-weight:700;color:var(--tl2);font-family:'Syne',sans-serif}
.c-tags{display:flex;flex-wrap:wrap;gap:3px}
.c-tag{font-size:9px;padding:2px 7px;border-radius:5px;border:1px solid var(--br);color:var(--mu);background:var(--bg)}
.c-icons{display:flex;flex-wrap:wrap;gap:4px}
.c-icon{font-size:10px;color:var(--tl2);font-weight:500}

/* Expand */
.c-xt{width:100%;background:none;border:none;border-top:1px solid var(--br);padding:7px 0 0;font-size:11px;color:var(--mu);cursor:pointer;text-align:center;display:flex;align-items:center;justify-content:center;gap:4px;font-family:'Inter',sans-serif;transition:color .15s}
.c-xt:hover{color:var(--tl2)}
.c-xp{display:none;padding-top:9px}
.c-xp.open{display:block}
.c-xs{font-size:9px;font-weight:700;color:var(--tl2);margin:8px 0 3px;text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--br);padding-bottom:3px}
.c-xr{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--br);font-size:11px;gap:7px}
.c-xr:last-child{border-bottom:none}
.c-xk{color:var(--mu);flex:1}.c-xv{font-weight:600;text-align:right;max-width:56%}

/* Map / Reviews row */
.c-extr{display:flex;gap:6px;padding:6px 0 0;flex-wrap:wrap}
.c-extbtn{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:5px 10px;border-radius:7px;cursor:pointer;text-decoration:none;transition:all .15s;border:1px solid var(--br);background:var(--bg);color:var(--mu);font-family:'Inter',sans-serif}
.c-extbtn.map{border-color:rgba(42,191,191,.3);color:var(--tl2);background:rgba(42,191,191,.06)}
.c-extbtn.rev{border-color:rgba(245,166,35,.3);color:#B87A00;background:rgba(245,166,35,.07)}
.c-extbtn:hover{opacity:.85;transform:scale(.98)}

/* Card footer */
.c-ft{padding:11px 13px;border-top:1px solid var(--br);display:flex;flex-direction:column;gap:6px}
.c-ctrow{display:flex;gap:5px}
.c-ctb{flex:1;padding:7px 5px;border-radius:7px;border:1px solid var(--br);font-size:11px;cursor:pointer;background:var(--bg);color:var(--mu);text-align:center;font-family:'Inter',sans-serif;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:3px}
.c-ctb:hover{border-color:var(--tl);color:var(--tl2);background:rgba(42,191,191,.05)}
.c-ctb.em{border-color:rgba(26,58,74,.2);color:var(--oc2)}
.c-cti{font-size:12px;color:var(--tl2);padding:3px 0;display:none;word-break:break-all}
.c-cti.vis{display:block}
.c-cti a{color:var(--tl2);font-weight:500}
.c-req{width:100%;padding:10px;background:var(--oc);color:#fff;border:none;border-radius:7px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.c-req:hover{background:var(--oc2)}
.c-site{display:flex;align-items:center;justify-content:center;gap:5px;padding:7px;color:var(--tl2);font-size:12px;text-decoration:none;border:1px solid var(--br);border-radius:7px;font-weight:500;transition:all .15s}
.c-site:hover{background:rgba(42,191,191,.06)}

/* SEO */
#seo-sec{background:var(--oc);border-radius:var(--r);padding:30px 26px;margin-top:36px}
#seo-sec h3{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:#fff;margin-bottom:16px}
.seo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px}
.seo-item strong{font-size:10px;font-weight:700;color:var(--org);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.7px}
.seo-item p{font-size:11px;line-height:1.72;color:rgba(255,255,255,.68)}

/* Notice */
#notice{background:var(--w);border:1px solid var(--br);border-radius:9px;padding:11px 14px;margin-top:14px;font-size:11px;color:var(--mu);line-height:1.65}

/* MODAL */
#moverlay{display:none;position:fixed;inset:0;background:rgba(26,58,74,.58);z-index:9999;align-items:center;justify-content:center;padding:14px}
#moverlay.open{display:flex}
#mbox{background:var(--w);border-radius:var(--r);padding:26px 22px;max-width:430px;width:100%;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 20px 60px rgba(26,58,74,.28);animation:mIn .2s ease}
@keyframes mIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
#mclose{position:absolute;top:11px;right:13px;background:var(--bg);border:none;font-size:16px;cursor:pointer;color:var(--mu);width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.m-h{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:3px}
.m-s{font-size:12px;color:var(--mu);margin-bottom:16px;padding-bottom:13px;border-bottom:1px solid var(--br)}
.m-s strong{color:var(--tl2)}
.m-fg{margin-bottom:12px}
.m-lbl{display:block;font-size:11px;font-weight:600;margin-bottom:4px;color:var(--tx)}
.m-inp,.m-ta{width:100%;padding:8px 11px;border:1.5px solid var(--br);border-radius:7px;font:13px 'Inter',sans-serif;color:var(--tx);background:var(--bg);outline:none;transition:border-color .15s}
.m-inp:focus,.m-ta:focus{border-color:var(--tl);background:var(--w)}
.m-ta{resize:vertical;min-height:75px}
#m-sub-btn{width:100%;padding:11px;background:var(--oc);color:#fff;border:none;border-radius:7px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:3px;transition:background .15s}
#m-sub-btn:hover{background:var(--oc2)}
#m-note{font-size:10px;color:var(--mu);text-align:center;margin-top:8px;line-height:1.5}
#m-note strong{color:var(--oc)}
#m-ok{display:none;text-align:center;padding:14px 0}
#m-ok .ok-ico{font-size:38px;display:block;margin-bottom:8px}
#m-ok h4{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--tl2);margin-bottom:5px}
#m-ok p{font-size:12px;color:var(--mu)}

/* MOBILE */
@media(max-width:720px){
  #layout{flex-direction:column}
  #sidebar{width:100%;height:auto;position:relative;top:0;border-right:none;border-bottom:1px solid var(--br);display:flex;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;padding:6px 0;gap:0}
  #sidebar::-webkit-scrollbar{height:3px}
  .sb-sec{display:none}
  .sb-item{flex-direction:column;gap:2px;padding:7px 10px;border-left:none;border-bottom:3px solid transparent;min-width:65px;text-align:center;font-size:10px}
  .sb-item.on{border-left-color:transparent;border-bottom-color:var(--tl);background:rgba(42,191,191,.05)}
  .sb-emoji{font-size:19px;width:auto}
  .sb-cnt{margin:0 auto}
  #main{padding:14px 12px}
  #cg{grid-template-columns:1fr}
  #hero{padding:30px 14px 26px}
  #topbar{padding:0 14px}
  .tb-logo-txt span{display:none}
}
</style>
</head>

    var phd=mk('div','c-cti'); phd.id='ph-'+s.id;
    var emd=mk('div','c-cti'); emd.id='em-'+s.id;
    bph.onclick=(function(sid,ph){return function(){toggleCt('ph-'+sid,ph,true)}})(s.id,s.ph);
    bem.onclick=(function(sid,em){return function(){toggleCt('em-'+sid,em,false)}})(s.id,s.em);
    ctrow.appendChild(bph); ctrow.appendChild(bem); ft.appendChild(ctrow); ft.appendChild(phd); ft.appendChild(emd);
    var req=mk('button','c-req',' '+t.btn_req||' ✉ Invia richiesta');
    req.onclick=(function(n,em){return function(){openModal(n,em)}})(nm,s.em);
    ft.appendChild(req);
    var sl=mk('a','c-site',t.btn_site||'🌐 Sito ufficiale');
    sl.href=s.url; sl.target='_blank'; sl.rel='noopener';
    ft.appendChild(sl);
    card.appendChild(ft);
    g.appendChild(card);
  });
}

function catEmoji(cat){
  var m={sport:'🏄',boat:'⛵',exc:'🌍',dive:'🤿',bike:'🚲',golf:'⛳',spa:'💆',hotel:'🏨',camping:'⛺',food:'🍝',wine:'🍷',culture:'🏛️'};
  return m[cat]||'📍';
}
function catLabel(cat,l){ var t=APP.tx[l]||APP.tx['it']; return t['sb_'+cat]||cat }
function starHtml(r){ var f=Math.floor(r),h=(r-f)>=0.5,e=5-f-(h?1:0); return '★'.repeat(f)+(h?'½':'')+'☆'.repeat(e) }

// ── CONTACT ──
function toggleCt(elId,enc,isPh){
  var el=document.getElementById(elId); if(!el)return;
  if(el.classList.contains('vis')){el.classList.remove('vis');return}
  var val=dc(enc);
  el.innerHTML=isPh?'📞 '+val:'📧 <a href="mailto:'+val+'">'+val+'</a>';
  el.classList.add('vis');
}

// ── MODAL ──
function openModal(name,emEnc){
  CN=name; CE=emEnc; var t=APP.tx[CL];
  qs('m-h',t.m_title);
  qi('m-s',t.m_subpre+' <strong>'+name+'</strong>');
  qs('m-le',t.m_le); qs('m-lp',t.m_lp); qs('m-lm',t.m_lm);
  document.getElementById('m-msg').value=t.m_md||'';
  document.getElementById('m-email').value='';
  document.getElementById('m-phone').value='';
  qs('m-sub-btn',t.m_sb); qi('m-note',t.m_fn);
  qs('m-ok1',t.m_ok1); qs('m-ok2',t.m_ok2);
  document.getElementById('m-form-area').style.display='block';
  document.getElementById('m-ok').style.display='none';
  document.getElementById('m-email').style.borderColor='';
  document.getElementById('moverlay').classList.add('open');
}
function closeM(){ document.getElementById('moverlay').classList.remove('open') }
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeM()});

// ── SEND ──
function sendReq(){
  var e=document.getElementById('m-email').value.trim();
  var p=document.getElementById('m-phone').value.trim();
  var m=document.getElementById('m-msg').value.trim();
  var fi=document.getElementById('m-email');
  if(!e||!e.includes('@')||!e.includes('.')){fi.style.borderColor='#DC2626';fi.focus();return}
  fi.style.borderColor='';
  var FID='YOUR_FORMSPREE_ID';
  var fd=new FormData();
  fd.append('_subject','[PortoPollo.com] '+CN);
  fd.append('_replyto',e); fd.append('_cc','info@portopollo.com');
  fd.append('centro',CN); fd.append('email_centro',dc(CE));
  fd.append('email_utente',e); fd.append('cellulare',p||'-');
  fd.append('messaggio',m); fd.append('fonte','PortoPollo.com Discovery');
  if(FID!=='YOUR_FORMSPREE_ID'){
    var btn=document.getElementById('m-sub-btn'); btn.disabled=true;
    fetch('https://formspree.io/f/'+FID,{method:'POST',body:fd,headers:{'Accept':'application/json'}})
      .then(function(r){btn.disabled=false;if(r.ok)showOK();else alert('Errore. Contatta il centro direttamente.')})
      .catch(function(){btn.disabled=false;showOK()});
  } else { showOK() }
}
function showOK(){
  document.getElementById('m-form-area').style.display='none';
  document.getElementById('m-ok').style.display='block';
}

// ── START ──
init('it');
</script>
