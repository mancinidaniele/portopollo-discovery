
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Porto Pollo Discovery 2026 — Cosa fare, dove mangiare, sport, hotel, escursioni</title>
<meta name="description" content="Guida completa Porto Pollo 2026: windsurf kitesurf wingfoil, barche, escursioni arcipelago La Maddalena, hotel, ristoranti tipici, diving, bici, cultura e natura.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ocean:#0B3D5E;--ocean2:#1565A3;--ocean3:#2196F3;
  --sand:#F4EDD8;--sand2:#E8D5A3;
  --teal:#14746F;--teal2:#1A9E97;
  --warm:#F5F1EB;--white:#fff;
  --tx:#1A1A2E;--mu:#64748B;--mu2:#94A3B8;
  --br:#E2E8F0;--br2:#CBD5E1;
  --r:16px;--rs:10px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --shadow-md:0 4px 24px rgba(11,61,94,.12);
  --shadow-lg:0 8px 48px rgba(11,61,94,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',sans-serif;background:var(--warm);color:var(--tx);font-size:14px;line-height:1.6;overflow-x:hidden}

/* ── TOP BAR ── */
#topbar{
  background:var(--ocean);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:52px;position:sticky;top:0;z-index:300;
  box-shadow:0 2px 12px rgba(0,0,0,.2);
}
#logo{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#fff;letter-spacing:-.3px}
#logo span{color:var(--sand2);font-size:13px;font-weight:400;margin-left:6px;font-family:'Inter',sans-serif}
#langbar{display:flex;gap:4px}
.lb{padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.55);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
.lb.on,.lb:hover{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.4)}

/* ── HERO ── */
#hero{
  background:linear-gradient(135deg,var(--ocean) 0%,var(--ocean2) 50%,var(--teal) 100%);
  padding:40px 24px 36px;text-align:center;position:relative;overflow:hidden;
}
#hero::before{content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='30'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
#htag{display:inline-block;background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-bottom:14px;position:relative}
#htitle{font-family:'Playfair Display',serif;font-size:clamp(22px,4vw,38px);font-weight:900;color:#fff;line-height:1.15;margin-bottom:10px;position:relative}
#hdesc{color:rgba(255,255,255,.75);font-size:13px;max-width:500px;margin:0 auto 22px;position:relative}
#hstats{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;position:relative}
.hstat strong{display:block;font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#fff}
.hstat span{font-size:10px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.5px}

/* ── LAYOUT ── */
#layout{display:flex;min-height:calc(100vh - 52px);align-items:flex-start}

/* ── SIDEBAR ── */
#sidebar{
  width:220px;flex-shrink:0;
  background:var(--white);
  border-right:1px solid var(--br);
  position:sticky;top:52px;
  height:calc(100vh - 52px);
  overflow-y:auto;
  padding:16px 0;
}
#sidebar::-webkit-scrollbar{width:3px}
#sidebar::-webkit-scrollbar-thumb{background:var(--br2);border-radius:2px}
.sb-section{padding:8px 16px 4px;font-size:10px;font-weight:700;color:var(--mu2);text-transform:uppercase;letter-spacing:1px}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;cursor:pointer;
  font-size:13px;font-weight:500;color:var(--mu);
  border-left:3px solid transparent;
  transition:all .15s;position:relative;
}
.sb-item:hover{background:var(--warm);color:var(--ocean)}
.sb-item.on{background:linear-gradient(to right,rgba(21,101,163,.06),transparent);color:var(--ocean);border-left-color:var(--ocean2);font-weight:600}
.sb-emoji{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.sb-count{margin-left:auto;background:var(--br);color:var(--mu);font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;min-width:20px;text-align:center}
.sb-item.on .sb-count{background:rgba(21,101,163,.12);color:var(--ocean2)}

/* ── MAIN CONTENT ── */
#main{flex:1;padding:24px 20px;min-width:0;max-width:1000px}
.section-head{margin-bottom:20px}
.section-head h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--tx);margin-bottom:4px}
.section-head p{font-size:13px;color:var(--mu)}

/* ── CARDS GRID ── */
#cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}

/* ── CARD ── */
.card{
  background:var(--white);border-radius:var(--r);
  border:1px solid var(--br);box-shadow:var(--shadow);
  overflow:hidden;display:flex;flex-direction:column;
  transition:box-shadow .2s,transform .2s;cursor:pointer;
}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.card.feat{border:2px solid var(--ocean2);box-shadow:var(--shadow-md)}

/* Card image gallery */
.c-gallery{position:relative;height:190px;background:linear-gradient(135deg,#B8D4EC,#A8D5C0);overflow:hidden;flex-shrink:0}
.c-imgs{display:flex;height:100%;transition:transform .35s ease}
.c-img{min-width:100%;height:100%;object-fit:cover;display:block;flex-shrink:0}
.c-imgfb{min-width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:52px;flex-shrink:0}
.c-prev,.c-next{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(0,0,0,.45);color:#fff;border:none;
  width:30px;height:30px;border-radius:50%;font-size:14px;cursor:pointer;
  display:none;align-items:center;justify-content:center;z-index:5;
  transition:background .15s;
}
.c-prev{left:8px}.c-next{right:8px}
.card:hover .c-prev,.card:hover .c-next{display:flex}
.c-prev:hover,.c-next:hover{background:rgba(0,0,0,.7)}
.c-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:5}
.c-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.5);transition:background .15s}
.c-dot.on{background:#fff}
.c-feat-badge{position:absolute;top:10px;left:10px;background:var(--ocean);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:12px;text-transform:uppercase;letter-spacing:.5px}
.c-cat-badge{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.45);color:#fff;font-size:10px;padding:3px 8px;border-radius:10px;backdrop-filter:blur(4px)}

/* Card rating */
.c-rating{display:flex;align-items:center;gap:6px;padding:8px 14px 0}
.c-stars{color:#F59E0B;font-size:13px;letter-spacing:.5px}
.c-rstars{font-size:13px;font-weight:600;color:var(--tx)}
.c-rcount{font-size:11px;color:var(--mu)}
.c-rlink{font-size:11px;color:var(--ocean3);text-decoration:none;margin-left:auto}
.c-rlink:hover{text-decoration:underline}

/* Card body */
.c-body{padding:12px 14px;flex:1;display:flex;flex-direction:column;gap:8px}
.c-badges{display:flex;flex-wrap:wrap;gap:4px}
.badge{font-size:9px;padding:2px 7px;border-radius:6px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.b-ws{background:#D1FAE5;color:#065F46}.b-ks{background:#EDE9FE;color:#5B21B6}
.b-wf{background:#DBEAFE;color:#1E40AF}.b-sup{background:#FEF3C7;color:#92400E}
.b-ef{background:#E0F2FE;color:#075985}.b-feat{background:var(--ocean);color:#fff}
.b-gen{background:#F1F5F9;color:#475569}
.c-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--tx);line-height:1.2}
.c-sub{font-size:11px;color:var(--mu);font-style:italic}
.c-desc{font-size:12px;color:#4B5563;line-height:1.68}

/* Price boxes */
.c-prices{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.c-price{background:var(--warm);border-radius:8px;padding:6px 9px;border:1px solid var(--br)}
.c-plbl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.3px;margin-bottom:1px}
.c-pval{font-size:14px;font-weight:700;color:var(--ocean);font-family:'Playfair Display',serif}

/* Tags & icons */
.c-tags{display:flex;flex-wrap:wrap;gap:4px}
.c-tag{font-size:10px;padding:2px 8px;border-radius:6px;border:1px solid var(--br);color:var(--mu);background:var(--warm)}
.c-icons{display:flex;flex-wrap:wrap;gap:5px}
.c-icon{font-size:10px;color:var(--teal);font-weight:600}

/* Expand toggle */
.c-xtoggle{
  width:100%;background:none;border:none;
  border-top:1px solid var(--br);padding:8px 0 0;
  font-size:11px;color:var(--mu);cursor:pointer;
  text-align:center;display:flex;align-items:center;justify-content:center;gap:5px;
  font-family:'Inter',sans-serif;transition:color .15s;
}
.c-xtoggle:hover{color:var(--ocean)}
.c-xpanel{display:none;padding-top:10px}
.c-xpanel.open{display:block}
.c-xsec{font-size:9px;font-weight:700;color:var(--ocean2);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--br);padding-bottom:3px}
.c-xrow{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--br);font-size:11px;gap:8px}
.c-xrow:last-child{border-bottom:none}
.c-xk{color:var(--mu);flex:1}.c-xv{font-weight:600;text-align:right;max-width:55%}

/* Map */
.c-map-row{padding:6px 0 0}
.c-map-btn{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;color:var(--ocean2);background:rgba(21,101,163,.06);
  border:1px solid rgba(21,101,163,.15);border-radius:8px;
  padding:5px 10px;cursor:pointer;font-family:'Inter',sans-serif;
  transition:all .15s;text-decoration:none;
}
.c-map-btn:hover{background:rgba(21,101,163,.12)}
.c-map-embed{display:none;margin-top:8px;border-radius:10px;overflow:hidden}
.c-map-embed.open{display:block}
.c-map-embed iframe{width:100%;height:180px;border:none;display:block}

/* Card footer */
.c-footer{padding:12px 14px;border-top:1px solid var(--br);display:flex;flex-direction:column;gap:7px}
.c-ctrow{display:flex;gap:6px}
.c-ctbtn{
  flex:1;padding:8px 6px;border-radius:8px;border:1px solid var(--br);
  font-size:11px;cursor:pointer;background:var(--warm);color:var(--mu);
  text-align:center;font-family:'Inter',sans-serif;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:4px;
}
.c-ctbtn:hover{border-color:var(--ocean2);color:var(--ocean2);background:var(--white)}
.c-ctbtn.em-btn{border-color:rgba(21,101,163,.3);color:var(--ocean2)}
.c-ctinfo{font-size:12px;color:var(--ocean2);padding:4px 0;display:none;word-break:break-all}
.c-ctinfo.vis{display:block}
.c-ctinfo a{color:var(--ocean2);font-weight:500}
.c-reqbtn{
  width:100%;padding:11px;background:var(--ocean);color:#fff;
  border:none;border-radius:8px;font-family:'Playfair Display',serif;
  font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.c-reqbtn:hover{background:var(--ocean2)}
.c-sitebtn{
  display:flex;align-items:center;justify-content:center;gap:5px;
  padding:7px;color:var(--ocean2);font-size:12px;
  text-decoration:none;border:1px solid var(--br);border-radius:8px;
  transition:all .15s;
}
.c-sitebtn:hover{background:var(--warm)}

/* ── SEO SECTION ── */
#seo-sec{background:var(--ocean);border-radius:var(--r);padding:32px 28px;margin-top:40px}
#seo-sec h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#fff;margin-bottom:18px}
.seo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:16px}
.seo-item strong{font-size:10px;font-weight:700;color:#fff;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px}
.seo-item p{font-size:11px;line-height:1.72;color:rgba(255,255,255,.68)}

/* ── MODAL ── */
#modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(11,61,94,.6);z-index:9999;
  align-items:center;justify-content:center;padding:16px;
}
#modal-overlay.open{display:flex}
#modal-box{
  background:var(--white);border-radius:var(--r);
  padding:28px 24px;max-width:440px;width:100%;
  max-height:88vh;overflow-y:auto;position:relative;
  box-shadow:var(--shadow-lg);
  animation:mIn .2s ease;
}
@keyframes mIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
#modal-close{
  position:absolute;top:12px;right:14px;
  background:var(--warm);border:none;font-size:16px;cursor:pointer;
  color:var(--mu);width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.m-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:4px}
.m-sub{font-size:12px;color:var(--mu);margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--br)}
.m-sub strong{color:var(--ocean2)}
.m-fg{margin-bottom:13px}
.m-lbl{display:block;font-size:11px;font-weight:600;margin-bottom:4px;color:var(--tx)}
.m-inp,.m-ta{
  width:100%;padding:9px 12px;border:1.5px solid var(--br);
  border-radius:8px;font:13px 'Inter',sans-serif;color:var(--tx);
  background:var(--warm);outline:none;transition:border-color .15s;
}
.m-inp:focus,.m-ta:focus{border-color:var(--ocean2);background:var(--white)}
.m-ta{resize:vertical;min-height:80px}
.m-submit{
  width:100%;padding:12px;background:var(--ocean);color:#fff;border:none;
  border-radius:8px;font-family:'Playfair Display',serif;font-size:15px;
  font-weight:700;cursor:pointer;margin-top:4px;transition:background .15s;
}
.m-submit:hover{background:var(--ocean2)}
.m-note{font-size:10px;color:var(--mu);text-align:center;margin-top:8px;line-height:1.5}
.m-note strong{color:var(--ocean)}
#m-success{display:none;text-align:center;padding:16px 0}
#m-success .ok-icon{font-size:40px;display:block;margin-bottom:8px}
#m-success h4{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--teal);margin-bottom:5px}
#m-success p{font-size:12px;color:var(--mu)}

/* ── NOTICE ── */
#notice{background:var(--white);border:1px solid var(--br);border-radius:10px;padding:12px 16px;margin-top:16px;font-size:11px;color:var(--mu);line-height:1.7}

/* ── MOBILE ── */
@media(max-width:720px){
  #layout{flex-direction:column}
  #sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--br);padding:8px 0;display:flex;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;gap:0}
  #sidebar::-webkit-scrollbar{height:3px}
  .sb-section{display:none}
  .sb-item{flex-direction:column;gap:3px;padding:8px 12px;border-left:none;border-bottom:3px solid transparent;min-width:70px;text-align:center;font-size:11px}
  .sb-item.on{border-left-color:transparent;border-bottom-color:var(--ocean2);background:rgba(21,101,163,.04)}
  .sb-emoji{font-size:20px;width:auto}
  .sb-count{margin:0 auto}
  #main{padding:16px 12px}
  #cg{grid-template-columns:1fr}
  #hero{padding:30px 14px 26px}
  #topbar{padding:0 14px}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="logo">Porto Pollo<span>Discovery</span></div>
  <div id="langbar">
    <button class="lb on" onclick="setLang('it')">🇮🇹</button>
    <button class="lb" onclick="setLang('en')">🇬🇧</button>
    <button class="lb" onclick="setLang('fr')">🇫🇷</button>
    <button class="lb" onclick="setLang('de')">🇩🇪</button>
  </div>
</div>

<!-- HERO -->
<div id="hero">
  <div id="htag"></div>
  <h1 id="htitle"></h1>
  <p id="hdesc"></p>
  <div id="hstats">
    <div class="hstat"><strong>25+</strong><span id="hs1"></span></div>
    <div class="hstat"><strong>10</strong><span id="hs2"></span></div>
    <div class="hstat"><strong>2026</strong><span id="hs3"></span></div>
    <div class="hstat"><strong>Apr-Nov</strong><span id="hs4"></span></div>
  </div>
</div>

<!-- LAYOUT -->
<div id="layout">

  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="sb-section" id="sb-sec1"></div>
    <div class="sb-item on" data-cat="all" onclick="filterCat(this,'all')">
      <span class="sb-emoji">🗺️</span>
      <span class="sb-label" id="sb-all"></span>
      <span class="sb-count" id="cnt-all"></span>
    </div>
    <div class="sb-item" data-cat="sport" onclick="filterCat(this,'sport')">
      <span class="sb-emoji">🏄</span>
      <span class="sb-label" id="sb-sport"></span>
      <span class="sb-count" id="cnt-sport"></span>
    </div>
    <div class="sb-item" data-cat="boat" onclick="filterCat(this,'boat')">
      <span class="sb-emoji">⛵</span>
      <span class="sb-label" id="sb-boat"></span>
      <span class="sb-count" id="cnt-boat"></span>
    </div>
    <div class="sb-item" data-cat="exc" onclick="filterCat(this,'exc')">
      <span class="sb-emoji">🌍</span>
      <span class="sb-label" id="sb-exc"></span>
      <span class="sb-count" id="cnt-exc"></span>
    </div>
    <div class="sb-item" data-cat="dive" onclick="filterCat(this,'dive')">
      <span class="sb-emoji">🤿</span>
      <span class="sb-label" id="sb-dive"></span>
      <span class="sb-count" id="cnt-dive"></span>
    </div>
    <div class="sb-item" data-cat="bike" onclick="filterCat(this,'bike')">
      <span class="sb-emoji">🚲</span>
      <span class="sb-label" id="sb-bike"></span>
      <span class="sb-count" id="cnt-bike"></span>
    </div>
    <div class="sb-section" id="sb-sec2"></div>
    <div class="sb-item" data-cat="hotel" onclick="filterCat(this,'hotel')">
      <span class="sb-emoji">🏨</span>
      <span class="sb-label" id="sb-hotel"></span>
      <span class="sb-count" id="cnt-hotel"></span>
    </div>
    <div class="sb-item" data-cat="bb" onclick="filterCat(this,'bb')">
      <span class="sb-emoji">🏡</span>
      <span class="sb-label" id="sb-bb"></span>
      <span class="sb-count" id="cnt-bb"></span>
    </div>
    <div class="sb-section" id="sb-sec3"></div>
    <div class="sb-item" data-cat="food" onclick="filterCat(this,'food')">
      <span class="sb-emoji">🍝</span>
      <span class="sb-label" id="sb-food"></span>
      <span class="sb-count" id="cnt-food"></span>
    </div>
    <div class="sb-item" data-cat="wine" onclick="filterCat(this,'wine')">
      <span class="sb-emoji">🍷</span>
      <span class="sb-label" id="sb-wine"></span>
      <span class="sb-count" id="cnt-wine"></span>
    </div>
    <div class="sb-section" id="sb-sec4"></div>
    <div class="sb-item" data-cat="culture" onclick="filterCat(this,'culture')">
      <span class="sb-emoji">🏛️</span>
      <span class="sb-label" id="sb-culture"></span>
      <span class="sb-count" id="cnt-culture"></span>
    </div>
    <div class="sb-item" data-cat="nature" onclick="filterCat(this,'nature')">
      <span class="sb-emoji">🌿</span>
      <span class="sb-label" id="sb-nature"></span>
      <span class="sb-count" id="cnt-nature"></span>
    </div>
  </nav>

  <!-- MAIN -->
  <main id="main">
    <div class="section-head">
      <h2 id="sec-title"></h2>
      <p id="sec-desc"></p>
    </div>
    <div id="cg"></div>
    <div id="notice"></div>
    <div id="seo-sec">
      <h3 id="seo-h"></h3>
      <div class="seo-grid" id="seo-grid"></div>
    </div>

function setLang(l){ init(l); }

// ── FILTER ──
function filterCat(el, cat){
  document.querySelectorAll('.sb-item').forEach(function(i){i.classList.remove('on')});
  el.classList.add('on');
  var t = TX[CL];
  qs('sec-title', cat === 'all' ? t.sec_title : (t['sb_'+cat]||cat));
  buildCards(cat);
  if(window.scrollTo) window.scrollTo({top: 0, behavior: 'smooth'});
}

// ── BUILD CARDS ──
function buildCards(cat){
  var t = TX[CL];
  var grid = document.getElementById('cg');
  grid.innerHTML = '';
  var list = cat === 'all' ? D : D.filter(function(c){return c.cat === cat});
  list.forEach(function(s){
    var nm = (s.nm && s.nm[CL]) || s.id;
    var sub = (s.sb && s.sb[CL]) || '';
    var des = (s.dc && s.dc[CL]) || '';
    var card = mk('div', 'card' + (s.feat?' feat':''));
    card.dataset.cat = s.cat;

    // Gallery
    var gal = mk('div','c-gallery');
    var wrap = mk('div','c-imgs');
    var imgs = s.imgs || [];
    if(imgs.length === 0) imgs = [''];
    imgs.forEach(function(src, idx){
      if(!src){
        var fb = mk('div','c-imgfb'); fb.innerHTML = catEmoji(s.cat); wrap.appendChild(fb);
      } else {
        var img = mk('img','c-img'); img.src = src; img.alt = nm;
        img.onerror = function(){
          var fb = mk('div','c-imgfb'); fb.innerHTML = catEmoji(s.cat);
          this.parentNode.replaceChild(fb, this);
        };
        wrap.appendChild(img);
      }
    });
    gal.appendChild(wrap);
    if(s.feat) { var fb2 = mk('div','c-feat-badge','★ Top'); gal.appendChild(fb2); }
    var catBadge = mk('div','c-cat-badge', catLabel(s.cat, CL));
    gal.appendChild(catBadge);
    // nav arrows
    if(imgs.length > 1){
      var prev = mk('button','c-prev','‹');
      var next = mk('button','c-next','›');
      var dotsDiv = mk('div','c-dots');
      var ci = [0];
      imgs.forEach(function(_, i){
        var d = mk('span','c-dot'+(i===0?' on':''));
        dotsDiv.appendChild(d);
      });
      prev.onclick = function(e){
        e.stopPropagation();
        var n = (ci[0]-1+imgs.length)%imgs.length; ci[0]=n;
        wrap.style.transform='translateX(-'+n*100+'%)';
        dotsDiv.querySelectorAll('.c-dot').forEach(function(d,i){d.classList.toggle('on',i===n)});
      };
      next.onclick = function(e){
        e.stopPropagation();
        var n = (ci[0]+1)%imgs.length; ci[0]=n;
        wrap.style.transform='translateX(-'+n*100+'%)';
        dotsDiv.querySelectorAll('.c-dot').forEach(function(d,i){d.classList.toggle('on',i===n)});
      };
      gal.appendChild(prev); gal.appendChild(next); gal.appendChild(dotsDiv);
    }
    card.appendChild(gal);

    // Rating
    if(s.rating){
      var rbar = mk('div','c-rating');
      var stars = mk('span','c-stars'); stars.innerHTML = starHtml(s.rating);
      var rval = mk('span','c-rstars', s.rating+'/5');
      var rcnt = mk('span','c-rcount', '('+s.rcount+' '+(CL==='it'?'recensioni':CL==='fr'?'avis':CL==='de'?'Bewertungen':'reviews')+')');
      var rlink = mk('a','c-rlink', TX[CL].btn_reviews || 'See reviews');
      rlink.href = s.rurl || '#'; rlink.target = '_blank';
      rbar.appendChild(stars); rbar.appendChild(rval); rbar.appendChild(rcnt); rbar.appendChild(rlink);
      card.appendChild(rbar);
    }

    // Body
    var body = mk('div','c-body');
    var bd = mk('div','c-badges');
    (s.badges||[]).forEach(function(b){
      var p = b.split(':'); var sp = mk('span','badge '+p[0], p[1]||p[0]); bd.appendChild(sp);
    });
    body.appendChild(bd);
    var nh = mk('div');
    nh.appendChild(mk('div','c-name',nm));
    nh.appendChild(mk('div','c-sub',sub));
    body.appendChild(nh);
    body.appendChild(mk('div','c-desc',des));
    // prices
    if(s.prices && s.prices.length){
      var pg = mk('div','c-prices');
      s.prices.forEach(function(p){
        var box = mk('div','c-price');
        box.appendChild(mk('div','c-plbl',p[0]));
        box.appendChild(mk('div','c-pval',p[1]));
        pg.appendChild(box);
      });
      body.appendChild(pg);
    }
    // tags
    var tg = mk('div','c-tags');
    (s.tags||[]).forEach(function(x){ tg.appendChild(mk('span','c-tag',x)) });
    body.appendChild(tg);
    // icons
    var ic = mk('div','c-icons');
    (s.icons||[]).forEach(function(x){ ic.appendChild(mk('span','c-icon',x)) });
    body.appendChild(ic);
    // map btn
    if(s.maps_url){
      var mapRow = mk('div','c-map-row');
      var mapBtn = mk('a','c-map-btn', TX[CL].btn_map || '📍 Dove siamo');
      mapBtn.href = s.maps_url; mapBtn.target = '_blank';
      mapRow.appendChild(mapBtn);
      body.appendChild(mapRow);
    }
    // expand
    var xtog = mk('button','c-xtoggle');
    var xspan = mk('span','', TX[CL].btn_expand || '▼ Dettagli');
    xtog.appendChild(xspan);
    xtog.onclick = (function(sid, btn){
      return function(){
        var p = document.getElementById('xp-'+sid);
        var op = p.classList.toggle('open');
        btn.querySelector('span').textContent = op ? (TX[CL].btn_close||'▲ Chiudi') : (TX[CL].btn_expand||'▼ Dettagli');
      };
    })(s.id, xtog);
    body.appendChild(xtog);
    // expand panel
    var xp = mk('div','c-xpanel'); xp.id = 'xp-'+s.id;
    (s.sec||[]).forEach(function(sec){
      xp.appendChild(mk('div','c-xsec', sec[0]));
      for(var i=1; i<sec.length; i++){
        var row = mk('div','c-xrow');
        row.appendChild(mk('span','c-xk', sec[i][0]));
        row.appendChild(mk('span','c-xv', sec[i][1]));
        xp.appendChild(row);
      }
    });
    body.appendChild(xp);
    card.appendChild(body);

    // Footer
    var foot = mk('div','c-footer');
    var ctrow = mk('div','c-ctrow');
    var btnPh = mk('button','c-ctbtn', TX[CL].btn_ph || '📞 Telefono');
    var btnEm = mk('button','c-ctbtn c-ctbtn em-btn', TX[CL].btn_em || '✉ Email');
    var phInfo = mk('div','c-ctinfo'); phInfo.id = 'ph-'+s.id;
    var emInfo = mk('div','c-ctinfo'); emInfo.id = 'em-'+s.id;
    btnPh.onclick = (function(sid,ph){return function(){toggleContact('ph-'+sid, ph, true)}})(s.id, s.ph);
    btnEm.onclick = (function(sid,em){return function(){toggleContact('em-'+sid, em, false)}})(s.id, s.em);
    ctrow.appendChild(btnPh); ctrow.appendChild(btnEm);
    foot.appendChild(ctrow); foot.appendChild(phInfo); foot.appendChild(emInfo);
    var reqBtn = mk('button','c-reqbtn', TX[CL].btn_req || '✉ Invia richiesta');
    reqBtn.onclick = (function(n, em){return function(){openModal(n, em)}})(nm, s.em);
    foot.appendChild(reqBtn);
    var siteBtn = mk('a','c-sitebtn', TX[CL].btn_site || '🌐 Sito');
    siteBtn.href = s.url; siteBtn.target = '_blank';
    foot.appendChild(siteBtn);
    card.appendChild(foot);
    grid.appendChild(card);
  });
}

function catEmoji(cat){
  var m={sport:'🏄',boat:'⛵',exc:'🌍',dive:'🤿',bike:'🚲',hotel:'🏨',bb:'🏡',food:'🍝',wine:'🍷',culture:'🏛️',nature:'🌿'};
  return m[cat] || '📍';
}
function catLabel(cat, l){
  var t = TX[l] || TX['it'];
  return t['sb_'+cat] || cat;
}
function starHtml(r){
  var full = Math.floor(r); var half = (r-full)>=0.5; var empty = 5-full-(half?1:0);
  return '★'.repeat(full) + (half?'½':'') + '☆'.repeat(empty);
}

// ── CONTACT TOGGLE ──
function toggleContact(elId, encoded, isPh){
  var el = document.getElementById(elId);
  if(!el) return;
  if(el.classList.contains('vis')){ el.classList.remove('vis'); return; }
  var val = dc(encoded);
  if(isPh){ el.textContent = '📞 ' + val; }
  else{ el.innerHTML = '✉ <a href="mailto:'+val+'">'+val+'</a>'; }
  el.classList.add('vis');
}

// ── MODAL ──
function openModal(name, emEnc){
  CN = name; CE = emEnc;
  var t = TX[CL];
  qs('m-title', t.modal_title);
  qi('m-sub', t.modal_sub_pre + ' <strong>' + name + '</strong>');
  qs('m-lbl-e', t.lbl_email); qs('m-lbl-p', t.lbl_phone); qs('m-lbl-m', t.lbl_msg);
  document.getElementById('m-msg').value = t.msg_default || '';
  document.getElementById('m-email').value = '';
  document.getElementById('m-phone').value = '';
  qs('m-submit', t.btn_send);
  qi('m-note', t.modal_note);
  qs('m-ok1', t.ok_title); qs('m-ok2', t.ok_desc);
  document.getElementById('m-form').style.display = 'block';
  document.getElementById('m-success').style.display = 'none';
  document.getElementById('m-email').style.borderColor = '';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
}
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeModal(); });

// ── SEND ──
function sendRequest(){
  var e = document.getElementById('m-email').value.trim();
  var p = document.getElementById('m-phone').value.trim();
  var m = document.getElementById('m-msg').value.trim();
  var fi = document.getElementById('m-email');
  if(!e || !e.includes('@') || !e.includes('.')){ fi.style.borderColor='#DC2626'; fi.focus(); return; }
  fi.style.borderColor = '';
  var FID = 'YOUR_FORMSPREE_ID';
  var fd = new FormData();
  fd.append('_subject', '[PortoPollo.com] ' + CN);
  fd.append('_replyto', e); fd.append('_cc', 'info@portopollo.com');
  fd.append('centro', CN); fd.append('email_centro', dc(CE));
  fd.append('email_utente', e); fd.append('cellulare', p||'—');
  fd.append('messaggio', m); fd.append('fonte', 'PortoPollo.com');
  if(FID !== 'YOUR_FORMSPREE_ID'){
    var btn = document.getElementById('m-submit'); btn.disabled = true;
    fetch('https://formspree.io/f/'+FID, {method:'POST',body:fd,headers:{'Accept':'application/json'}})
      .then(function(r){ btn.disabled=false; if(r.ok) showOK(); else alert('Errore. Contatta direttamente.'); })
      .catch(function(){ btn.disabled=false; showOK(); });
  } else { showOK(); }
}
function showOK(){
  document.getElementById('m-form').style.display = 'none';
  document.getElementById('m-success').style.display = 'block';
}

// ── START ──
init('it');

</script>
